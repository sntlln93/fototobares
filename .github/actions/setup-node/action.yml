name: Setup Node
description: Node.js with the npm cache and dependencies installed. Single source of truth for the Node version.

runs:
  using: composite
  steps:
    - name: ⚙️ Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'

    - name: 📦 npm install
      shell: bash
      run: npm ci
